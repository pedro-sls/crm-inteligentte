name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://USER:PASSWORD@HOST.neon.tech/DB?sslmode=require"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      AUTH_SECRET: "ci-auth-secret-with-more-than-32-characters"
      WEBHOOK_SIGNING_SECRET: "ci-webhook-secret-with-more-than-32-chars"
      API_KEY_PEPPER: "ci-api-key-pepper-with-more-than-32-chars"
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check secrets
        run: npm run security:secrets

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Skip deploy when Vercel secrets are missing
        if: ${{ env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == '' }}
        run: echo "::notice::Vercel secrets are not configured. Quality gate passed; deploy skipped."

      - name: Pull Vercel environment
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel output
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: npx vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: npx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
